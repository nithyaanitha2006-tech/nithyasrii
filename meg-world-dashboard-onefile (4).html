<style>
  #meg-dash *{ box-sizing:border-box; }
  #meg-dash{
    --void:#F3F6FC;
    --panel:#FFFFFF;
    --panel-2:#EEF3FB;
    --edge:rgba(15,23,42,0.09);
    --edge-hi:rgba(37,99,235,0.35);
    --teal:#2563EB;
    --cyan:#0891B2;
    --sand:#1B2436;
    --muted:#64748B;
    --success:#16A34A;
    --danger:#DC2626;
    --gold:#B45309;
    font-family:'Helvetica Neue', Arial, sans-serif;
    color:var(--sand);
    background:var(--void);
    min-height:100vh;
    display:flex;
    font-size:14px;
    position:relative;
    overflow-x:hidden;
  }
  #meg-dash h1,#meg-dash h2,#meg-dash h3{ font-family:'Georgia','Times New Roman',serif; margin:0; font-weight:normal; }
  #meg-dash .mono{ font-family:'SFMono-Regular',Consolas,monospace; letter-spacing:0.03em; }

  /* drifting starfield backdrop */
  #meg-dash .field-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.6;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(37,99,235,0.22) 0, transparent 100%),
      radial-gradient(1px 1px at 70% 65%, rgba(37,99,235,0.16) 0, transparent 100%),
      radial-gradient(1px 1px at 40% 80%, rgba(37,99,235,0.14) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 15%, rgba(8,145,178,0.22) 0, transparent 100%),
      radial-gradient(1px 1px at 55% 45%, rgba(37,99,235,0.12) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 10% 60%, rgba(8,145,178,0.2) 0, transparent 100%);
    background-size:600px 600px;
    animation:drift 60s linear infinite;
  }
  @keyframes drift{ from{ background-position:0 0; } to{ background-position:-600px 300px; } }

  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  #meg-dash .anim{ animation:fadeUp .5s cubic-bezier(.2,.7,.3,1) both; }

  /* ---------- Sidebar ---------- */
  #meg-dash .sidebar{
    width:240px; flex-shrink:0; background:linear-gradient(180deg,var(--panel-2),var(--void));
    border-right:1px solid var(--edge);
    display:flex; flex-direction:column; padding:24px 16px; gap:28px;
    position:sticky; top:0; height:100vh; z-index:2;
  }
  #meg-dash .brand{ display:flex; align-items:center; gap:11px; padding:0 4px; }
  #meg-dash .brand-mark{
    width:38px; height:38px; border-radius:50%; flex-shrink:0; position:relative;
    overflow:hidden; box-shadow:0 0 18px rgba(8,145,178,0.45);
  }
  #meg-dash .brand-mark img{ width:100%; height:100%; object-fit:cover; display:block; }
  #meg-dash .brand-mark::after{
    content:''; position:absolute; inset:-6px; border-radius:50%; border:1px solid rgba(8,145,178,0.35);
    animation:spin 12s linear infinite;
  }
  #meg-dash .brand-mark::before{
    content:''; position:absolute; top:-9px; left:50%; width:4px; height:4px; margin-left:-2px; border-radius:50%;
    background:var(--cyan); box-shadow:0 0 6px var(--cyan);
    animation:spin 12s linear infinite; transform-origin:2px 16px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #meg-dash .brand-text{ font-family:'Georgia',serif; letter-spacing:1.2px; font-size:1.05rem; }
  #meg-dash .brand-text em{ font-style:normal; color:var(--cyan); }
  #meg-dash .brand-sub{ font-size:0.64rem; color:var(--muted); letter-spacing:1.5px; margin-top:2px; text-transform:uppercase; font-family:'SFMono-Regular',Consolas,monospace; }

  #meg-dash nav{ display:flex; flex-direction:column; gap:3px; position:relative; }
  #meg-dash .nav-item{
    display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:9px;
    cursor:pointer; color:var(--muted); font-size:0.87rem; position:relative; z-index:1;
    transition:color .25s;
  }
  #meg-dash .nav-item svg{ width:16px; height:16px; flex-shrink:0; transition:transform .3s; }
  #meg-dash .nav-item:hover{ color:var(--sand); }
  #meg-dash .nav-item:hover svg{ transform:translateX(2px); }
  #meg-dash .nav-item.active{ color:var(--sand); }
  #meg-dash .nav-item.active svg{ color:var(--cyan); }
  #meg-dash .nav-glow{
    position:absolute; left:0; width:100%; height:38px; border-radius:9px; z-index:0;
    background:linear-gradient(90deg, rgba(37,99,235,0.22), rgba(8,145,178,0.06));
    border:1px solid var(--edge-hi); box-shadow:0 0 16px rgba(37,99,235,0.25);
    transition:transform .35s cubic-bezier(.2,.8,.3,1);
  }
  #meg-dash .nav-count{ margin-left:auto; font-size:0.66rem; font-family:'SFMono-Regular',Consolas,monospace; background:rgba(15,23,42,0.06); padding:1px 7px; border-radius:20px; color:var(--muted); }

  #meg-dash .sidebar-foot{ margin-top:auto; font-size:0.72rem; color:var(--muted); padding:12px 4px; line-height:1.6; border-top:1px solid var(--edge); }

  /* ---------- Main ---------- */
  #meg-dash .main{ flex:1; min-width:0; display:flex; flex-direction:column; position:relative; z-index:1; }
  #meg-dash .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 36px; border-bottom:1px solid var(--edge);
    backdrop-filter:blur(10px); background:rgba(255,255,255,0.72);
    position:sticky; top:0; z-index:5;
  }
  #meg-dash .topbar h1{ font-size:1.4rem; letter-spacing:0.3px; }
  #meg-dash .topbar-sub{ color:var(--muted); font-size:0.82rem; margin-top:4px; }
  #meg-dash .save-status{ display:flex; align-items:center; gap:9px; font-size:0.76rem; color:var(--muted); font-family:'SFMono-Regular',Consolas,monospace; }
  #meg-dash .save-dot{ width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 8px var(--success); transition:background .2s, box-shadow .2s; }
  #meg-dash .save-dot.saving{ background:var(--gold); box-shadow:0 0 8px var(--gold); animation:pulse 0.7s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

  #meg-dash .content{ padding:32px 36px 70px; max-width:1120px; }

  /* ---------- Cards ---------- */
  #meg-dash .card{
    background:linear-gradient(160deg, var(--panel), var(--panel-2));
    border:1px solid var(--edge); border-radius:14px; padding:22px 24px;
    transition:border-color .25s, transform .25s;
  }
  #meg-dash .card:hover{ border-color:rgba(37,99,235,0.3); }
  #meg-dash .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  #meg-dash .grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  #meg-dash .stack{ display:flex; flex-direction:column; gap:18px; }
  #meg-dash label{ display:block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin-bottom:6px; font-weight:600; font-family:'SFMono-Regular',Consolas,monospace; }
  #meg-dash input[type=text], #meg-dash input[type=number], #meg-dash textarea, #meg-dash select{
    width:100%; border:1px solid var(--edge); border-radius:8px; padding:10px 12px;
    font-family:inherit; font-size:0.87rem; color:var(--sand); background:rgba(15,23,42,0.035);
    transition:border-color .2s, background .2s;
  }
  #meg-dash input:focus, #meg-dash textarea:focus, #meg-dash select:focus{ outline:none; border-color:var(--cyan); background:rgba(8,145,178,0.05); }
  #meg-dash textarea{ resize:vertical; min-height:60px; line-height:1.5; }
  #meg-dash .field{ margin-bottom:14px; }
  #meg-dash .row{ display:flex; gap:12px; }
  #meg-dash .row > *{ flex:1; }

  #meg-dash button{ font-family:inherit; cursor:pointer; border:none; }
  #meg-dash .btn{ padding:10px 17px; border-radius:8px; font-size:0.84rem; font-weight:600; transition:transform .15s, box-shadow .15s; }
  #meg-dash .btn:active{ transform:scale(0.97); }
  #meg-dash .btn-primary{ background:linear-gradient(120deg,var(--teal),var(--cyan)); color:#04101F; }
  #meg-dash .btn-primary:hover{ box-shadow:0 0 18px rgba(8,145,178,0.4); }
  #meg-dash .btn-ghost{ background:transparent; color:var(--muted); border:1px solid var(--edge); }
  #meg-dash .btn-ghost:hover{ border-color:var(--cyan); color:var(--cyan); }
  #meg-dash .btn-danger-text{ background:transparent; color:var(--danger); font-size:0.78rem; padding:4px 6px; opacity:0.75; }
  #meg-dash .btn-danger-text:hover{ opacity:1; }
  #meg-dash .icon-btn{ background:transparent; color:var(--muted); padding:5px; border-radius:6px; display:flex; }
  #meg-dash .icon-btn:hover{ background:rgba(15,23,42,0.06); color:var(--sand); }
  #meg-dash .icon-btn svg{ width:15px; height:15px; }

  #meg-dash .toggle{ position:relative; width:38px; height:21px; background:rgba(15,23,42,0.14); border-radius:20px; transition:background .2s; flex-shrink:0; cursor:pointer; }
  #meg-dash .toggle.on{ background:var(--teal); box-shadow:0 0 10px rgba(37,99,235,0.5); }
  #meg-dash .toggle::after{ content:''; position:absolute; top:2px; left:2px; width:17px; height:17px; background:#fff; border-radius:50%; transition:transform .25s cubic-bezier(.3,1.4,.4,1); }
  #meg-dash .toggle.on::after{ transform:translateX(17px); }

  #meg-dash .badge{ font-size:0.66rem; padding:3px 10px; border-radius:20px; font-weight:600; letter-spacing:0.4px; font-family:'SFMono-Regular',Consolas,monospace; }
  #meg-dash .badge-live{ background:rgba(22,163,74,0.12); color:var(--success); border:1px solid rgba(22,163,74,0.28); }
  #meg-dash .badge-hidden{ background:rgba(15,23,42,0.05); color:var(--muted); border:1px solid var(--edge); }

  #meg-dash .section-head p{ color:var(--muted); font-size:0.85rem; margin-top:4px; }

  /* ---------- Overview: orbit ---------- */
  #meg-dash .orbit-wrap{ display:flex; gap:32px; align-items:center; flex-wrap:wrap; justify-content:center; }
  #meg-dash .orbit-stage{ width:280px; height:280px; position:relative; flex-shrink:0; }
  #meg-dash .orbit-ring{ position:absolute; inset:0; border-radius:50%; border:1px dashed rgba(15,23,42,0.14); }
  #meg-dash .orbit-ring.r2{ inset:36px; }
  #meg-dash .orbit-core{
    position:absolute; top:50%; left:50%; width:68px; height:68px; margin:-34px 0 0 -34px; border-radius:50%;
    box-shadow:0 0 30px rgba(37,99,235,0.32), inset 0 0 20px rgba(255,255,255,0.55);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    border:2px solid rgba(8,145,178,0.5);
  }
  #meg-dash .orbit-core img{ width:100%; height:100%; object-fit:cover; display:block; }
  #meg-dash .orbit-spin{ position:absolute; inset:0; animation:spin 34s linear infinite; }
  #meg-dash .orbit-node{
    position:absolute; width:46px; height:46px; margin:-23px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    animation:spin 34s linear infinite reverse; cursor:default;
  }
  #meg-dash .orbit-node .dot{
    width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:#04101F; transition:transform .2s;
  }
  #meg-dash .orbit-node:hover .dot{ transform:scale(1.15); }
  #meg-dash .orbit-node svg{ width:19px; height:19px; }
  #meg-dash .orbit-legend{ display:flex; flex-direction:column; gap:9px; min-width:220px; flex:1; }
  #meg-dash .orbit-legend-item{ display:flex; align-items:center; gap:10px; font-size:0.83rem; padding:7px 10px; border-radius:8px; transition:background .2s; }
  #meg-dash .orbit-legend-item:hover{ background:rgba(15,23,42,0.04); }
  #meg-dash .orbit-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  #meg-dash .orbit-legend-item .n{ margin-left:auto; color:var(--muted); font-family:'SFMono-Regular',Consolas,monospace; font-size:0.72rem; }

  #meg-dash .stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
  #meg-dash .stat-card{ background:linear-gradient(160deg, var(--panel), var(--panel-2)); border:1px solid var(--edge); border-radius:14px; padding:18px 20px; position:relative; overflow:hidden; cursor:pointer; transition:transform .2s, border-color .2s; }
  #meg-dash .stat-card::after{ content:''; position:absolute; bottom:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,var(--teal),var(--cyan)); transform:scaleX(0); transform-origin:left; transition:transform .5s; }
  #meg-dash .stat-card:hover{ transform:translateY(-3px); border-color:rgba(37,99,235,0.35); }
  #meg-dash .stat-card:hover::after{ transform:scaleX(1); }
  #meg-dash .stat-card:hover .stat-label{ color:var(--cyan); }
  #meg-dash .stat-card:active{ transform:translateY(-1px) scale(0.98); }
  #meg-dash .stat-card .stat-arrow{ position:absolute; top:14px; right:14px; width:13px; height:13px; color:var(--muted); opacity:0; transform:translate(-4px,4px); transition:opacity .2s, transform .2s; }
  #meg-dash .stat-card:hover .stat-arrow{ opacity:1; transform:translate(0,0); color:var(--cyan); }
  #meg-dash .stat-num{ font-family:'Georgia',serif; font-size:1.8rem; color:var(--cyan); }
  #meg-dash .stat-label{ font-size:0.75rem; color:var(--muted); margin-top:3px; font-family:'SFMono-Regular',Consolas,monospace; }

  #meg-dash .activity-list{ display:flex; flex-direction:column; }
  #meg-dash .activity-row{ display:flex; gap:12px; padding:11px 0; border-bottom:1px solid var(--edge); font-size:0.83rem; }
  #meg-dash .activity-row:last-child{ border-bottom:none; }
  #meg-dash .activity-time{ color:var(--muted); font-size:0.72rem; white-space:nowrap; margin-left:auto; font-family:'SFMono-Regular',Consolas,monospace; }
  #meg-dash .activity-dot{ width:6px; height:6px; border-radius:50%; background:var(--cyan); margin-top:6px; flex-shrink:0; box-shadow:0 0 6px var(--cyan); }

  /* ---------- Services ---------- */
  #meg-dash .service-row{ display:flex; align-items:center; gap:16px; padding:16px 18px; border:1px solid var(--edge); border-radius:12px; margin-bottom:10px; background:rgba(15,23,42,0.02); transition:border-color .2s, transform .2s; }
  #meg-dash .service-row:hover{ border-color:rgba(37,99,235,0.35); transform:translateX(3px); }
  #meg-dash .service-icon-sw{ width:42px; height:42px; border-radius:10px; background:rgba(37,99,235,0.1); display:flex; align-items:center; justify-content:center; color:var(--cyan); flex-shrink:0; border:1px solid rgba(37,99,235,0.2); }
  #meg-dash .service-row .info{ flex:1; min-width:0; }
  #meg-dash .service-row .info h3{ font-size:0.95rem; font-family:'Georgia',serif; }
  #meg-dash .service-row .info p{ font-size:0.8rem; color:var(--muted); margin-top:3px; }
  #meg-dash .service-row .actions{ display:flex; align-items:center; gap:14px; }
  #meg-dash [contenteditable]:focus{ outline:1px solid var(--cyan); outline-offset:3px; border-radius:3px; }

  /* ---------- Packages ---------- */
  #meg-dash .pkg-card{ border:1px solid var(--edge); border-radius:14px; padding:20px; background:linear-gradient(160deg,var(--panel),var(--panel-2)); position:relative; transition:transform .25s, border-color .25s; }
  #meg-dash .pkg-card:hover{ transform:translateY(-3px); }
  #meg-dash .pkg-card.featured{ border-color:var(--cyan); box-shadow:0 0 24px rgba(8,145,178,0.18); }
  #meg-dash .pkg-price{ font-family:'Georgia',serif; font-size:1.6rem; margin:8px 0 14px; color:var(--cyan); }
  #meg-dash .pkg-price span{ font-size:0.76rem; color:var(--muted); font-weight:normal; font-family:'SFMono-Regular',Consolas,monospace; }
  #meg-dash .feat-item{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  #meg-dash .feat-item input{ flex:1; }
  #meg-dash .add-feat{ font-size:0.78rem; color:var(--cyan); margin-top:6px; padding:4px 0; opacity:0.85; }
  #meg-dash .add-feat:hover{ opacity:1; }

  /* ---------- Testimonials / Blog ---------- */
  #meg-dash .list-card{ border:1px solid var(--edge); border-radius:14px; padding:18px 20px; margin-bottom:14px; background:linear-gradient(160deg,var(--panel),var(--panel-2)); transition:border-color .2s; }
  #meg-dash .list-card:hover{ border-color:rgba(37,99,235,0.28); }
  #meg-dash .list-card .top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px; }
  #meg-dash .quote-mark{ font-family:'Georgia',serif; font-size:1.7rem; color:var(--cyan); line-height:1; opacity:0.8; }

  #meg-dash .empty{ text-align:center; padding:50px 20px; color:var(--muted); }
  #meg-dash .empty svg{ width:34px; height:34px; opacity:0.4; margin-bottom:10px; }

  #meg-dash .content-fade{ animation:fadeUp .4s cubic-bezier(.2,.7,.3,1) both; }

  @media (max-width:820px){
    #meg-dash{ flex-direction:column; }
    #meg-dash .sidebar{ width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto; padding:14px; }
    #meg-dash .sidebar-foot{ display:none; }
    #meg-dash nav{ flex-direction:row; }
    #meg-dash .nav-glow{ display:none; }
    #meg-dash .grid-2, #meg-dash .grid-3{ grid-template-columns:1fr; }
    #meg-dash .stat-row{ grid-template-columns:1fr 1fr; }
    #meg-dash .content{ padding:20px; }
    #meg-dash .topbar{ padding:16px 20px; }
    #meg-dash .orbit-stage{ width:220px; height:220px; }
  }
  #meg-dash *{ scrollbar-width:thin; scrollbar-color:rgba(15,23,42,0.18) transparent; }


  /* Dashboard-level quick-access buttons (bottom-right) */
  #meg-dash .dash-whatsapp-float{
    position:fixed; bottom:24px; right:24px; width:56px; height:56px;
    background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(37,211,102,0.45); z-index:60; cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease; border:none; text-decoration:none;
  }
  #meg-dash .dash-whatsapp-float:hover{ transform:scale(1.08); box-shadow:0 8px 22px rgba(37,211,102,0.55); }
  #meg-dash .dash-whatsapp-float svg{ width:28px; height:28px; }

  #meg-dash .dash-chat-launcher{
    position:fixed; bottom:24px; right:92px; width:56px; height:56px;
    background:var(--sand); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(15,23,42,0.35); z-index:60; cursor:pointer; color:#fff;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  #meg-dash .dash-chat-launcher:hover{ transform:scale(1.08); box-shadow:0 8px 22px rgba(15,23,42,0.45); }
  #meg-dash .dash-chat-launcher svg{ width:26px; height:26px; }
  #meg-dash .dash-chat-launcher .dash-chat-close{ display:none; }
  #meg-dash .dash-chat-launcher.is-open .dash-chat-chat{ display:none; }
  #meg-dash .dash-chat-launcher.is-open .dash-chat-close{ display:block; }

  #meg-dash .dash-chat-window{
    position:fixed; bottom:92px; right:24px; width:300px; max-width:calc(100vw - 40px);
    height:360px; background:#fff; border-radius:14px; box-shadow:0 18px 44px rgba(15,23,42,0.28);
    display:flex; flex-direction:column; overflow:hidden; z-index:60;
    opacity:0; transform:translateY(14px) scale(0.98); pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
  }
  #meg-dash .dash-chat-window.is-open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  #meg-dash .dash-chat-header{ background:var(--sand); color:#fff; padding:14px 16px; font-size:0.85rem; font-weight:600; }
  #meg-dash .dash-chat-header span{ display:block; font-size:0.72rem; font-weight:400; color:#9FB4D6; margin-top:2px; }
  #meg-dash .dash-chat-body{ flex:1; padding:14px; font-size:0.85rem; color:var(--muted); overflow-y:auto; background:var(--void); }
  #meg-dash .dash-chat-body .msg{ background:#fff; border:1px solid var(--edge); border-radius:12px; padding:10px 12px; margin-bottom:8px; color:var(--sand); }

  @media (max-width:640px){
    #meg-dash .dash-whatsapp-float, #meg-dash .dash-chat-launcher{ width:48px; height:48px; bottom:18px; }
    #meg-dash .dash-whatsapp-float{ right:18px; }
    #meg-dash .dash-chat-launcher{ right:78px; }
    #meg-dash .dash-chat-window{ right:18px; bottom:78px; }
  }
</style>

<div id="meg-dash">
  <div class="field-bg"></div>

  let state = null;
  let currentTab = 'overview';
  let selectedServiceId = null;
  let saveTimer = null;
  const STORAGE_KEY = 'meg-world-cms';

  function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

  function logActivity(msg){
    state.activity.unshift({ msg, time: new Date().toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) });
    state.activity = state.activity.slice(0,12);
  }

  // Fallback storage shim: uses window.storage when available (Claude artifact
  // environment), and transparently falls back to localStorage otherwise, so
  // the dashboard also works when opened directly as a plain HTML file.
  const storageShim = (window.storage && typeof window.storage.get === 'function') ? window.storage : {
    async get(key){
      const v = localStorage.getItem(key);
      return v === null ? null : { value: v };
    },
    async set(key, value){
      localStorage.setItem(key, value);
      return { value };
    }
  };

  async function loadState(){
    try{
      const res = await storageShim.get(STORAGE_KEY, true);
      if(res && res.value){
        state = JSON.parse(res.value);
        if(!state.header) state.header = JSON.parse(JSON.stringify(DEFAULT_DATA.header));
        if(!state.contact) state.contact = JSON.parse(JSON.stringify(DEFAULT_DATA.contact));
        if(!state.portfolio) state.portfolio = JSON.parse(JSON.stringify(DEFAULT_DATA.portfolio));
        if(!state.faq) state.faq = JSON.parse(JSON.stringify(DEFAULT_DATA.faq));
        if(!state.activity) state.activity = [];
        if(state.services){
          state.services.forEach(s=>{
            if(!s.features){
              const def = DEFAULT_DATA.services.find(d=>d.id===s.id);
              s.features = def ? JSON.parse(JSON.stringify(def.features)) : [];
            }
          });
        }
        return;
      }
    }catch(e){ /* fresh install */ }
    state = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  async function persist(){
    const btn = document.getElementById('saveBtn');
    const label = document.getElementById('saveLabel');
    if(!btn || !label) return;
    btn.disabled = true;
    label.textContent = 'Saving…';
    try{
      await storageShim.set(STORAGE_KEY, JSON.stringify(state), true);
      label.textContent = 'Saved ✓';
    }catch(e){
      label.textContent = 'Save failed — click to retry';
      console.error('MEG dashboard: save failed -', e.message);
    }finally{
      btn.disabled = false;
      setTimeout(()=>{ if(label.textContent!=='Save failed — click to retry') label.textContent = 'Save'; }, 1600);
    }
  }
  function scheduleSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(persist, 400); }

  function render(){ renderNav(); renderPage(); }

  const TAB_ORDER = ['overview','header','services','packages','portfolio','testimonials','faq','blog','preview'];
  const TITLES = {
    overview: ['Overview','A snapshot of everything live on megworld.com'],
    header: ['Header','Your site logo, navigation menu, and hero banner.'],
    services: ['Services','The six disciplines shown on your homepage.'],
    packages: ['Packages','Pricing tiers shown on your Packages section.'],
    portfolio: ['Portfolio','Featured work shown in the Our Work section.'],
    testimonials: ['Testimonials','Client quotes shown in the Why Choose section.'],
    faq: ['FAQ','Questions and answers shown in Frequently Asked Questions.'],
    blog: ['Blog','Posts shown under Latest Insights.'],
    preview: ['Live Website Preview','This is exactly what visitors see right now — updates the instant you save.']
  };
  function renderNav(){
    const labels = { overview:'Overview', header:'Header', services:'Services', packages:'Packages', portfolio:'Portfolio', testimonials:'Testimonials', faq:'FAQ', blog:'Blog', preview:'Live Preview' };
    const counts = { services: state.services.filter(s=>s.live).length+'/'+state.services.length, packages: state.packages.length, portfolio: state.portfolio.length, testimonials: state.testimonials.length, faq: state.faq.length, blog: state.blog.length };
    const navEl = document.getElementById('nav');
    navEl.innerHTML = `<div class="nav-glow" id="navGlow"></div>` + TAB_ORDER.map(key=>`
      <div class="nav-item ${currentTab===key?'active':''}" data-tab="${key}">
        ${ICONS[key]}<span>${labels[key]}</span>
        ${counts[key]!==undefined?`<span class="nav-count">${counts[key]}</span>`:''}
      </div>`).join('');
    navEl.querySelectorAll('.nav-item').forEach(el=>{
      el.addEventListener('click', ()=>{ currentTab = el.dataset.tab; selectedServiceId = null; render(); });
    });
    requestAnimationFrame(positionGlow);
  }
  function positionGlow(){
    const active = document.querySelector('.nav-item.active');
    const glow = document.getElementById('navGlow');
    if(active && glow){ glow.style.transform = `translateY(${active.offsetTop}px)`; }
  }

  function renderPage(){
    if(currentTab==='services' && selectedServiceId){
      const s = state.services.find(x=>x.id===selectedServiceId);
      document.getElementById('pageTitle').textContent = s ? s.name : TITLES.services[0];
      document.getElementById('pageSub').textContent = 'Editing this service — Back to Services to see the full list.';
    } else {
      document.getElementById('pageTitle').textContent = TITLES[currentTab][0];
      document.getElementById('pageSub').textContent = TITLES[currentTab][1];
    }
    const c = document.getElementById('content');
    c.classList.remove('content-fade'); void c.offsetWidth; c.classList.add('content-fade');
    if(currentTab==='overview') c.innerHTML = viewOverview();
    else if(currentTab==='header') c.innerHTML = viewHeader();
    else if(currentTab==='services') c.innerHTML = selectedServiceId ? viewServiceDetail(selectedServiceId) : viewServices();
    else if(currentTab==='packages') c.innerHTML = viewPackages();
    else if(currentTab==='portfolio') c.innerHTML = viewPortfolio();
    else if(currentTab==='testimonials') c.innerHTML = viewTestimonials();
    else if(currentTab==='faq') c.innerHTML = viewFaq();
    else if(currentTab==='blog') c.innerHTML = viewBlog();
    else if(currentTab==='preview') c.innerHTML = viewPreview();
    bindPageEvents();
    if(currentTab==='preview') bindPreviewEditing();
    if(currentTab==='overview') animateCounters();
  }

  function animateCounters(){
    document.querySelectorAll('.stat-num[data-target]').forEach(el=>{
      const target = Number(el.dataset.target);
      const suffix = el.dataset.suffix || '';
      let cur = 0;
      const step = Math.max(1, Math.round(target/20));
      const t = setInterval(()=>{
        cur += step;
        if(cur >= target){ cur = target; clearInterval(t); }
        el.textContent = cur + suffix;
      }, 25);
    });
  }

  /* ---------------- Overview ---------------- */
  function viewOverview(){
    const colors = ['#2E8BFF','#00D9FF','#5B7FE0','#38D089','#F2B95A','#C58CF2'];
    const n = state.services.length;
    const radius = 116;
    const nodes = state.services.map((s,i)=>{
      const a = (Math.PI*2*i/n) - Math.PI/2;
      const x = 140 + radius*Math.cos(a), y = 140 + radius*Math.sin(a);
      return { s, x, y, color: colors[i%colors.length] };
    });
    const orbitNodes = nodes.map(nd=>`
      <div class="orbit-node" style="top:${nd.y}px; left:${nd.x}px;" title="${esc(nd.s.name)}">
        <div class="dot" style="background:${nd.color}; opacity:${nd.s.live?1:0.25}; box-shadow:${nd.s.live?`0 0 14px ${nd.color}`:'none'};">${ICONS[nd.s.icon]||ICONS.web}</div>
      </div>`).join('');
    const legend = nodes.map(nd=>`
      <div class="orbit-legend-item">
        <span class="orbit-dot" style="background:${nd.color}; opacity:${nd.s.live?1:0.3}; box-shadow:${nd.s.live?`0 0 6px ${nd.color}`:'none'};"></span>
        <span>${esc(nd.s.name)}</span>
        <span class="n">${nd.s.live?'LIVE':'HIDDEN'}</span>

    const activity = state.activity.length ? state.activity.map(a=>`
      <div class="activity-row"><span class="activity-dot"></span><span>${esc(a.msg)}</span><span class="activity-time">${a.time}</span></div>
    `).join('') : `<div class="empty">${ICONS.empty}<div>No changes yet — edits you make will show up here.</div></div>`;

    const liveServices = state.services.filter(s=>s.live).length;

    return `
      <div class="stat-row anim">
        <div class="stat-card" data-action="goto-tab" data-tab="services">${ARROW}<div class="stat-num" data-target="${liveServices}">0</div><div class="stat-label">SERVICES LIVE / ${state.services.length}</div></div>
        <div class="stat-card" data-action="goto-tab" data-tab="packages">${ARROW}<div class="stat-num" data-target="${state.packages.length}">0</div><div class="stat-label">PACKAGES</div></div>

        <div class="stat-card" data-action="goto-tab" data-tab="blog">${ARROW}<div class="stat-num" data-target="${state.blog.filter(b=>b.published).length}">0</div><div class="stat-label">POSTS PUBLISHED / ${state.blog.length}</div></div>
      </div>
      <div class="stack">
        <div class="card anim" style="animation-delay:.05s">
          <h2 style="font-size:1.05rem;margin-bottom:16px;">Six disciplines, one roof</h2>
          <div class="orbit-wrap">
            <div class="orbit-stage">
              <div class="orbit-ring"></div>
              <div class="orbit-ring r2"></div>
              <div class="orbit-spin">${orbitNodes}</div>
              <div class="orbit-core"><img src="${LOGO_URI}" alt="MEG WORLD"></div>
            </div>
            <div class="orbit-legend">${legend}</div>
          </div>
        </div>
        <div class="card anim" style="animation-delay:.1s">
          <h2 style="font-size:1.05rem;margin-bottom:6px;">Recent activity</h2>
          <div class="activity-list">${activity}</div>
        </div>
      </div>`;
  }

  // Reads/writes a value on `state` from a dot-path like "header.heroTitle"
  // or "services.<id>.name" (where a segment matches an item's `id`, that
  // array is searched by id instead of treated as a numeric index).
  function resolveBindTarget(path){
    const parts = path.split('.');
    let obj = state;
    for(let i=0;i<parts.length-1;i++){
      const key = parts[i];
      if(Array.isArray(obj)){
        const found = obj.find(item=>String(item.id)===key);
        obj = found !== undefined ? found : obj[key];
      } else {
        obj = obj[key];
      }
      if(obj === undefined || obj === null) return null;
    }
    return { obj, key: parts[parts.length-1] };
  }

  function bindPreviewEditing(){
    const c = document.getElementById('content');
    c.querySelectorAll('.inline-edit').forEach(el=>{
      el.addEventListener('blur', ()=>{
        const path = el.dataset.bind;
        const target = resolveBindTarget(path);
        if(!target) return;
        const newVal = el.textContent;
        if(target.obj[target.key] === newVal) return;
        target.obj[target.key] = newVal;
        logActivity(`Edited "${path.split('.').pop()}" from the live preview`);
        scheduleSave();
      });
      el.addEventListener('keydown', (ev)=>{
        if(ev.key==='Enter' && el.tagName!=='P'){ ev.preventDefault(); el.blur(); }
      });
    });
  }

  function emptyState(msg, action, label){
    return `<div class="card empty anim">${ICONS.empty}<div>${msg}</div><button class="btn btn-primary" style="margin-top:14px;" data-action="${action}">${label}</button></div>`;
  }

  function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function escAttr(s){ return (s||'').replace(/"/g,'&quot;'); }

  function bindPageEvents(){

    const addNavLink = c.querySelector('[data-action=add-nav-link]');

      const s = state.services.find(x=>x.id===el.dataset.id); if(s && s.name!==el.textContent){ s.name=el.textContent; logActivity(`Updated service name: ${s.name}`); scheduleSave(); renderNav(); }

    c.querySelectorAll('.edit-desc').forEach(el=>el.addEventListener('blur', ()=>{

    c.querySelectorAll('.edit-service-feat').forEach(el=>el.addEventListener('change', ()=>{

    c.querySelectorAll('[data-action=del-service-feat]').forEach(el=>el.addEventListener('click', ()=>{

    c.querySelectorAll('.edit-pkg-price').forEach(el=>el.addEventListener('change', ()=>{

    }));
    c.querySelectorAll('.edit-feat').forEach(el=>el.addEventListener('change', ()=>{

    c.querySelectorAll('[data-action=add-feat]').forEach(el=>el.addEventListener('click', ()=>{

    c.querySelectorAll('.edit-faq-a').forEach(el=>el.addEventListener('change', ()=>{

    c.querySelectorAll('[data-action=del-faq]').forEach(el=>el.addEventListener('click', ()=>{
      state.faq=state.faq.filter(x=>x.id!==el.dataset.id); logActivity('Removed a FAQ entry'); scheduleSave(); renderPage(); renderNav();
    }));
    const addFaq = c.querySelector('[data-action=add-faq]');
    if(addFaq) addFaq.addEventListener('click', ()=>{
      state.faq.push({ id:uid('f'), question:'New question?', answer:'Write the answer here.' });
      logActivity('Added a new FAQ entry'); scheduleSave(); renderPage(); renderNav();

    c.querySelectorAll('.edit-quote').forEach(el=>el.addEventListener('change', ()=>{
      const t=state.testimonials.find(x=>x.id===el.dataset.id); t.quote=el.value; scheduleSave();
    }));
    c.querySelectorAll('.edit-author').forEach(el=>el.addEventListener('change', ()=>{

    c.querySelectorAll('[data-action=del-testimonial]').forEach(el=>el.addEventListener('click', ()=>{

    const addT = c.querySelector('[data-action=add-testimonial]');
    if(addT) addT.addEventListener('click', ()=>{

      const b=state.blog.find(x=>x.id===el.dataset.id); b.excerpt=el.value; scheduleSave();

    c.querySelectorAll('[data-action=toggle-post]').forEach(el=>el.addEventListener('click', ()=>{
      const b=state.blog.find(x=>x.id===el.dataset.id); b.published=!b.published; logActivity(`${b.published?'Published':'Unpublished'} "${b.title}"`); scheduleSave(); renderPage(); renderNav();

    c.querySelectorAll('[data-action=del-post]').forEach(el=>el.addEventListener('click', ()=>{
      state.blog=state.blog.filter(x=>x.id!==el.dataset.id); logActivity('Removed a post'); scheduleSave(); renderPage(); renderNav();
    }));
    const addPost = c.querySelector('[data-action=add-post]');
    if(addPost) addPost.addEventListener('click', ()=>{
      state.blog.unshift({ id:uid('b'), title:'New post title', date:new Date().toLocaleString(undefined,{month:'long', year:'numeric'}), excerpt:'Write a short excerpt here.', published:false });
      logActivity('Added a new draft post'); scheduleSave(); renderPage(); renderNav();
    });
  }


  async function init(){
    document.getElementById('saveLabel').textContent = 'Loading…';
    await loadState();
    document.getElementById('saveLabel').textContent = 'Save';
    const saveBtn = document.getElementById('saveBtn');
    if(saveBtn) saveBtn.addEventListener('click', persist);
    render();
  }

  init();
})();
</script>

  function b64ToUtf8(b64){
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  const btn = document.getElementById('previewSiteBtn');
  if(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault();
      try{
        const html = b64ToUtf8(SITE_HTML_B64);
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank', 'noopener');
      }catch(err){
        console.error('Preview failed', err);
        window.open('https://megworld.com', '_blank', 'noopener');
      }
    });
  }
})();
